{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="mb-3" id="flash-messages-container">
  {% for category, message in messages %}
  {% set alert_class = 'danger' if category == 'error' else category %}
  <div class="alert alert-{{ alert_class }} alert-dismissible fade show shadow-lg" role="alert"
    style="pointer-events: auto;">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>
<script>
  (function () {
    setTimeout(function () {
      const alerts = document.querySelectorAll('#flash-messages-container .alert');
      alerts.forEach(function (alert) {
        if (typeof bootstrap !== 'undefined' && bootstrap.Alert) {
          const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
          if (bsAlert) {
            bsAlert.close();
          } else {
            alert.classList.remove('show');
            setTimeout(() => alert.remove(), 150);
          }
        } else {
          alert.classList.remove('show');
          setTimeout(() => alert.remove(), 150);
        }
      });
    }, 2000);
  })();
</script>
{% endif %}
{% endwith %}
