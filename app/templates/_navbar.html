<nav class="navbar mb-2" id="mainNavbar" style="height: 55px; z-index: 1000; position: sticky; top: 0; background: var(--bg-surface); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
    <div class="container-fluid">
        <div class="d-flex align-items-center gap-3">
            <button class="sidebar-toggle-btn btn btn-sm btn-outline-secondary d-lg-none" id="sidebarToggle" title="Toggle Menu">
                <span class="fs-5">☰</span>
            </button>
            <a href="{{ url_for('main.home') }}" class="navbar-brand d-flex align-items-center" style="font-size: 1.2rem; text-decoration: none; color: var(--text-main);">
                <span class="text-neon fw-bold">Dispatch Manager</span>
                <span class="badge bg-glass text-neon ms-2" style="font-size: 0.6em; vertical-align: middle;">V3.0</span>
                {% if is_admin(session.get('role')) %}
                <div class="dropdown d-inline-block">
                    <span id="activeConnectionsBadge" class="badge bg-info ms-2 dropdown-toggle" 
                          style="font-size: 0.55em; vertical-align: middle; cursor: pointer; border: 1px solid rgba(255,255,255,0.3);" 
                          data-bs-toggle="dropdown" 
                          title="Cliquez pour voir les utilisateurs connectés">? CONNECTÉS</span>
                    <ul id="connectedUsersList" class="dropdown-menu dropdown-menu-start shadow-lg" 
                        style="min-width: 220px; background: #1e293b; border: 1px solid #334155; max-height: 300px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
                        <li class="dropdown-header" style="color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; padding: 8px 16px;">Utilisateurs connectés</li>
                        <li><span class="dropdown-item-text" style="color: #cbd5e1; padding: 8px 16px;">Chargement...</span></li>
                    </ul>
                </div>
                {% endif %}
            </a>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <!-- The notification bell will be injected here by notification_system.js -->
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm" title="Changer de thème">🌙</button>
            <div class="dropdown">
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fas fa-user-circle"></i> {{ session.get('user', 'Utilisateur') }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-lg" aria-labelledby="userDropdown" style="background: #1e293b; border: 1px solid #334155; backdrop-filter: blur(10px);">
                    <li><a class="dropdown-item" href="{{ url_for('auth.profil') }}" style="color: #e2e8f0;" onmouseover="this.style.background='#334155'; this.style.color='#ffffff';" onmouseout="this.style.background='transparent'; this.style.color='#e2e8f0';"><i class="fas fa-user me-2" style="color: #94a3b8;"></i> Mon Profil</a></li>
                    <li><hr class="dropdown-divider" style="border-color: #334155;"></li>
                    <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}" style="color: #f87171;" onmouseover="this.style.background='#334155'; this.style.color='#fca5a5';" onmouseout="this.style.background='transparent'; this.style.color='#f87171';"><i class="fas fa-sign-out-alt me-2" style="color: #f87171;"></i> Se déconnecter</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>
