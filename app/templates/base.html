<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Dispatch Manager{% endblock %}</title>

    <!-- Apply theme EARLY to prevent flash -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'light') {
                    document.documentElement.classList.add('light-mode');
                }
            } catch (e) { }
        })();
    </script>

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='img/site.webmanifest') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

    <!-- Google Fonts: Outfit + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Design System V2 -->
    <link href="{{ url_for('static', filename='css/tokens_v2.css') }}?v=11.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/animations.css') }}?v=11.0" rel="stylesheet">

    <!-- Custom Modern Styles -->
    <link href="{{ url_for('static', filename='css/style_modern.css') }}?v=11.2" rel="stylesheet">

    {% block styles %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <!-- Global Flash Messages (Floating) -->
    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3 mt-5"
        style="z-index: 1055; pointer-events: none; width: 100%; max-width: 600px;">
        {% include "_flash_messages.html" %}
    </div>

    <!-- Apply light-mode to body as well (matches <html>) -->
    <script>
        (function () {
            if (document.documentElement.classList.contains('light-mode')) {
                document.body.classList.add('light-mode');
            }
        })();
    </script>

    <!-- Pass Flask user session to JS globally -->
    <script>
        window.CURRENT_USER = {{ session.get('user', '') | tojson }};
    </script>

    {% block content %}{% endblock %}

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}?v=11.0"></script>
    <script src="{{ url_for('static', filename='js/notification_system.js') }}?v=12.11"></script>

    {% block scripts %}{% endblock %}
</body>

</html>
