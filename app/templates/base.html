<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Dispatch Manager{% endblock %}</title>
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='img/site.webmanifest') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Design System -->
    <link href="{{ url_for('static', filename='css/tokens.css') }}?v=8.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/transitions.css') }}?v=8.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/components.css') }}?v=8.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/layouts.css') }}?v=8.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/polish.css') }}?v=8.0" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link href="{{ url_for('static', filename='css/style.css') }}?v=8.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style_modern.css') }}?v=8.0" rel="stylesheet">

    {% block styles %}{% endblock %}

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
