{% extends 'base.html' %}

{% block title %}Modifier l'incident - Dispatch Manager{% endblock %}

{% block content %}
<div class="container py-4">
  <!-- Navbar -->
  <nav class="navbar navbar-light bg-light rounded mb-4 shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">Modifier l'incident #{{ numero }}</span>
      <div class="d-flex align-items-center gap-2">
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm" title="Changer de thème">&#127769;</button>
        <a href="{{ url_for('main.home') }}" class="btn btn-outline-primary btn-sm">← Retour</a>
      </div>
    </div>
  </nav>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <input type="hidden" name="expected_version" value="{{ version }}" />

        <div class="mb-3">
          <label class="form-label">Localisation précise <small class="text-muted">(ex: HD-3E-AW_08)</small></label>
          <input type="text" name="localisation" class="form-control" value="{{ current_localisation }}"
            placeholder="Bâtiment-Étage-Bureau...">
        </div>
        <div class="mb-3">
          <label class="form-label">Note</label>
          <textarea name="note" class="form-control" rows="5">{{ current_note }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <a href="{{ url_for('main.home') }}" class="btn btn-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
