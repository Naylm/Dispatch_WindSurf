{% extends "base.html" %}

{% block title %}Connexion - Dispatch Manager{% endblock %}

{% block styles %}
<link href="{{ url_for('static', filename='css/login.css') }}?v=11.0" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-card">

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M20 7h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 4h4v3h-4V4zm10 16H4V9h16v11z" />
        </svg>
      </div>
      <h1 class="login-title">Dispatch Manager</h1>
      <p class="login-subtitle">Gestion d'incidents</p>
    </div>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" placeholder="Votre mot de passe" required>
      </div>

      <button type="submit" class="btn-login">
        Connexion
      </button>

      <div style="text-align: center; margin-top: 16px;">
        <a href="{{ url_for('auth.forgot_password') }}"
          style="color: #60a5fa; text-decoration: none; font-size: 14px; font-weight: 500;">
          🔑 Mot de passe oublié ?
        </a>
      </div>
    </form>


  </div>

  <button id="themeToggle"
    style="position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; width: 44px; height: 44px; font-size: 1.2rem; cursor: pointer !important; backdrop-filter: blur(10px); transition: all 0.2s ease; z-index: 100;"
    title="Changer de thème">🌙</button>

  <div class="footer">
    Dispatch Manager © 2025
  </div>
</div>
{% endblock %}
