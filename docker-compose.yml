# ============================================
# Docker Compose - Dispatch Manager v2.0
# ============================================
# Stack complète : PostgreSQL + Flask App + Nginx
# Pour démarrer : docker-compose up -d
# Pour arrêter : docker-compose down
# Logs : docker-compose logs -f [service]

services:
  # ==========================================
  # Redis (Message Queue pour Socket.IO)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: dispatch_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatch_network

  # ==========================================
  # Base de données PostgreSQL
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: dispatch_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=dispatch
      - POSTGRES_USER=dispatch_user
      - POSTGRES_PASSWORD=dispatch_pass
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Exposer pour accès externe (débug, pgAdmin, etc.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch_user -d dispatch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dispatch_network

  # ==========================================
  # Application Flask (Dispatch Manager)
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dispatch_manager
    restart: unless-stopped
    volumes:
      # Volume pour les fichiers uploadés (images wiki, etc.)
      - dispatch_uploads:/app/static/uploads
      # Volume pour les données persistantes (backups, etc.)
      - dispatch_data:/app/data
      # OPTIONNEL : Montage du code source pour développement (décommenter si besoin)
      # - .:/app
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production_please_use_secrets_token_hex}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - DB_TYPE=postgresql
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dispatch
      - POSTGRES_USER=dispatch_user
      - POSTGRES_PASSWORD=dispatch_pass
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
      - DB_POOL_MAX=${DB_POOL_MAX:-20}
      - WTF_CSRF_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - dispatch_network
    # Limites de ressources (ajustées pour 4 workers)
    deploy:
      resources:
        limits:
          cpus: '2.0'      # 2 CPUs pour 4 workers
          memory: 2G       # 2GB RAM pour 4 workers
        reservations:
          cpus: '1.0'      # Minimum garanti
          memory: 1G       # Minimum garanti

  # ==========================================
  # Reverse Proxy Nginx
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: dispatch_nginx
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP
      # - "443:443"   # HTTPS (décommenter si SSL configuré)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - dispatch_uploads:/var/www/uploads:ro
      # OPTIONNEL : Certificats SSL (décommenter si HTTPS activé)
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dispatch_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ==========================================
  # OPTIONNEL : pgAdmin (interface web PostgreSQL)
  # ==========================================
  # Décommenter pour activer pgAdmin
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: dispatch_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     - PGADMIN_DEFAULT_EMAIL=admin@dispatch.local
  #     - PGADMIN_DEFAULT_PASSWORD=admin
  #     - PGADMIN_LISTEN_PORT=5050
  #   ports:
  #     - "5050:5050"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   depends_on:
  #     - postgres
  #   networks:
  #     - dispatch_network

# ==========================================
# Volumes persistants
# ==========================================
volumes:
  postgres_data:
    driver: local
  dispatch_uploads:
    driver: local
  dispatch_data:
    driver: local
  redis_data:
    driver: local
  # pgadmin_data:
  #   driver: local

# ==========================================
# Réseau interne
# ==========================================
networks:
  dispatch_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
