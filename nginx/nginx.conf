    # server {
    #     listen 443 ssl http2;
    #     server_name agartha.cc www.agartha.cc;
    #     ssl_certificate /etc/letsencrypt/live/agartha.cc/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/agartha.cc/privkey.pem;
    #     # ... (le reste de la config SSL est identique)
    # }
}
