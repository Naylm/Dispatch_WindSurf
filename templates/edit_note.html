<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifier l'incident</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Design System -->
  <link href="{{ url_for('static', filename='css/tokens.css') }}?v=8.0" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/transitions.css') }}?v=8.0" rel="stylesheet" />
  <link href="{{ url_for(\'static\', filename=\'css/components.css\') }}?v=8.0" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/layouts.css') }}?v=8.0" rel="stylesheet" />
  <!-- Custom Styles -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="container py-4">

  <!-- Navbar -->
  <nav class="navbar navbar-light bg-light rounded mb-4 shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">Modifier l'incident #{{ numero }}</span>
      <button id="themeToggle" class="btn btn-outline-secondary btn-sm">🌙</button>
      <a href="{{ url_for('home') }}" class="btn btn-outline-primary btn-sm">← Retour</a>
    </div>
  </nav>

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="mb-3">
      <label class="form-label">Localisation précise <small class="text-muted">(ex: HD-3E-AW_08)</small></label>
      <input type="text" name="localisation" class="form-control" value="{{ current_localisation }}" placeholder="Bâtiment-Étage-Bureau...">
    </div>
    <div class="mb-3">
      <label class="form-label">Note</label>
      <textarea name="note" class="form-control" rows="5">{{ current_note }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">Annuler</a>
  </form>

  <script>
    // Theme toggle
    const toggle = document.getElementById('themeToggle');
    toggle.onclick = () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme',
        document.body.classList.contains('dark') ? 'dark' : 'light');
    };
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
