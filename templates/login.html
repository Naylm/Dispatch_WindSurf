<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Dispatch Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #667eea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-emoji {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
    }

    .login-title {
      font-size: 26px;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .login-subtitle {
      color: #718096;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      color: #4a5568;
      font-weight: 500;
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      background-color: #f7fafc;
    }

    .form-control:focus {
      outline: none;
      border-color: #667eea;
      background-color: white;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #667eea;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: #5568d3;
    }

    .btn-login:active {
      background: #4a5bc4;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-top: 16px;
      background-color: #fed7d7;
      color: #c53030;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      .login-card {
        padding: 36px 28px;
      }
      .logo-emoji {
        font-size: 48px;
      }
      .login-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      
      <div class="logo">
        <span class="logo-emoji">🎫</span>
        <h1 class="login-title">Dispatch Manager</h1>
        <p class="login-subtitle">Gérez vos incidents efficacement</p>
      </div>

      <form method="post">
        <div class="form-group">
          <label class="form-label">Nom d'utilisateur</label>
          <input type="text" name="username" class="form-control" placeholder="Votre identifiant" required autofocus>
        </div>

        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" name="password" class="form-control" placeholder="Votre mot de passe" required>
        </div>

        <button type="submit" class="btn-login">Se connecter</button>
      </form>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert">⚠️ {{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

    </div>
  </div>

</body>
</html>
